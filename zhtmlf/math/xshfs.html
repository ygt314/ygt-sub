<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>位置:math/小数化分数</title>
</head>
<body>
    <script>
    abs=Math.abs;
    round=Math.round;
    function xs_fs()
    {
        var nbf,i,j,j2,mypro;
var nfloat=document.getElementById('nbfloat');
var resa=document.getElementById('resa');
var resb=document.getElementById('resb');
var pro=document.getElementById('myprogress');
        nbf=nfloat.value;
        pro.innerHTML="0%";
        mypro=0;
        for(i=1;i<1e10;i++)
        {
            if(i%1e5==0)
            {
                mypro+=1;
pro.innerHTML="计算中..."+(mypro/1000)+"%";
            }
            j=nbf*i;
            j2=round(j);
            if(abs(j-j2)<=1e-7)
            {a=j2;b=i;break;}
        }
        pro.innerHTML="计算完成";
        resa.innerHTML=a;
        resb.innerHTML=b;
    }
    </script>
    <h1>小数化分数</h1>
    <p>请输入小数:</p>
    <input type="text" id="nbfloat" style="color:#48ACEF">
<button onclick="xs_fs()">开始</button> 
    <div id='myprogress'>[未开始]</div>结果:
    <div id='resa' style="color:#48ACEF"></div>
    --------------------
    <div id='resb' style="color:#48ACEF"></div>
</body>
</html>
