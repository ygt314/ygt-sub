<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>位置:math/分数约分</title>
</head>
<body>
    <h1>分数约分</h1>
    <script>
min=Math.min;
abs=Math.abs;
function yf()
{
var x,y,i,z,s,ax,ay;
x=document.getElementById('varX').value;
ax=abs(x);
y=document.getElementById('varY').value;
ay=abs(y);
z=abs(x-y);
s=min(ax,ay,z);
if(x==y&y!=0)
{
    x=1;
    y=1;
}
else if(s==0)
{s=1;}
for(i=s;i>0;i--)
{
    if(y==0)
    {window.alert("分母不能为0");break;}
    else if(x%i==0&y%i==0)
    {
        x=x/i;
        y=y/i;
        break;
    }
}
document.getElementById('resx').innerHTML=x;
document.getElementById('resy').innerHTML=y;
}
    </script>
    <p>请输入分数:</p>
    <p><input type="number" id="varX">
    <br> ----------------------------------------<br> 
    <input type="number" id="varY"></p> 
    <button onclick="yf()">约分</button> <br>结果: 
    <div id="resx" style="color:#48ACEF"></div> --------------------
    <div id="resy" style="color:#48ACEF"></div>
</body>
</html>
