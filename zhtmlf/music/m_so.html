<title>我的音乐</title>
<script type="text/javascript" src="../myweb.js"></script>
<script>
function xmsj(n)
{
    var mutext=document.getElementById('mutext').value;
    var varweb="http://www.xmsj.org/?name="+mutext+"&type=netease";
    if(n==1)
    {
    window.alert("即将跳转");
    window.location.replace(varweb);
    }
    else
    {document.getElementById('resweb').src=varweb;}
}
</script>
</head>
<body>
<h1>音乐</h1>
<h3>画中画</h3>
<p>方式一</p>
<p>网址: <input type="text" id="varweb"></p> <button onclick="myweb(0)">开始</button> <button onclick="myweb(1)">跳转</button>
<p>方式二</p>
