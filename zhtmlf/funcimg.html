<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>位置:../函数图像</title>
	<script type="text/javascript" src="funcImg.js"></script>
	<script src="gczcdjs/js/countdown.js" type="text/javascript"></script>
    <link href="gczcdjs/css/css.css" rel="stylesheet" type="text/css"/>
	<style>
		#div-img {
			/* 此决定画布的宽高 */
			width: 600px;
			height: 600px;
		}
		#input-controller {
			padding: 10px;
			background-color: azure;
		}
	</style>
</head>
<body>
    <div class="djs">
        <span id=gkcountdown></span>
        <span id=zkcountdown></span>
    </div>
	<div id="input-controller">
		<div id="function">
			<button onclick="Add()">Add Function</button>
			<span id="mod" style="display:none" name="0">
				<input type="color"/>y=
				<input type="text" value="x^2" name="Fun"/>
				<button onclick="Delete(this.parentNode)">Delete</button>
                <input type="checkbox" onclick="reDraw()" checked="checked"/>Draw Line
			</span>
		</div>
		<div id="option">
			X：<input id="xLeftValue" /> ~
			<input id="xRightValue" />
			<br> Y：
			<input id="yLeftValue" /> ~
			<input id="yRightValue" />
			<br>
			<span id="show-size">Size:</span>
		</div>
		<button onclick="change()">Draw</button>
	</div>
	<div id="main">
		<h1>函数图像绘制工具</h1>
		<div id="div-img">
			<canvas id="graph"></canvas>
		</div>
	</div>
</body>
<script>
	const FONT_STYLE = "20px 黑体";
	const MIN = 1e-4;
	const MAX = 1e8;
	const EPS = 1e-12;
	const CANVAS = $("graph");
	const CONTEXT_2D = CANVAS.getContext("2d");
	const FUN_IMG_WIDTH = CANVAS.parentNode.clientWidth;
	const FUN_IMG_HEIGHT = CANVAS.parentNode.clientHeight;
	var xLeftValue = -FUN_IMG_WIDTH / 100; // x最左的值
	var xRightValue = FUN_IMG_WIDTH / 100;
	var yLeftValue = -FUN_IMG_HEIGHT / 100;
	var yRightValue = FUN_IMG_HEIGHT / 100;
	var tableX, tableY, countX, countY;
	var funStage = 0,
		mouseX, mouseY;
	var tmp;
</script>
<script>
	CANVAS.width = FUN_IMG_WIDTH;
	CANVAS.height = FUN_IMG_HEIGHT;
	$("show-size").innerHTML = "Size：" + FUN_IMG_WIDTH + "*" + FUN_IMG_HEIGHT;
	CANVAS.onmousedown = function(ob) {
		mouseX = ob.layerX;
		mouseY = ob.layerY;
		funStage = 1;
	}
	CANVAS.onmousemove = function(ob) {
		if(funStage != 1) {
			return;
		}
		var NoX, NoY, det;
		NoX = ob.layerX;
		NoY = ob.layerY;
		det = (mouseX - NoX) / FUN_IMG_WIDTH * (xRightValue - xLeftValue);
		xLeftValue += det;
		xRightValue += det;
		det = (NoY - mouseY) / FUN_IMG_HEIGHT * (yRightValue - yLeftValue);
		yLeftValue += det;
		yRightValue += det;
		mouseX = NoX;
		mouseY = NoY;
		reDraw();
		update();
	}
	CANVAS.onmouseup = function(ob) {
		if(funStage == 1) {
			funStage = 0;
			reDraw();
		}
	}
	CANVAS.onmouseleave = function(ob) {
		if(funStage == 1) {
			funStage = 0;
			reDraw();
		}
	}
	CANVAS.onmousewheel = function(ob) {
		// 取消事件的默认动作
		ob.preventDefault();
		// 放大的比例
		var ScaleRate = 0.9;
		var detail;
		if(ob.wheelDelta) {
			detail = ob.wheelDelta;
		} else if(ob.detail) {
			detail = ob.detail;
		}
		if(detail > 0) {
			scale(ob.layerX, FUN_IMG_HEIGHT - 1 - ob.layerY, ScaleRate);
		} else {
			scale(ob.layerX, FUN_IMG_HEIGHT - 1 - ob.layerY, 1 / ScaleRate);
		}
		reDraw();
		update();
	}
	// 初始化
	reDraw();
	update();
	Add();
</script>
</html>
